version: "3.9"

services:
  # --- Database migrations (runs once before backend) ---
  init:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=agent_platform
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-agent_platform_secret}
      - DB_HOST=db
      - DB_PORT=5432
      - CHANNEL_LAYER_BACKEND=channels_redis.core.RedisChannelLayer
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - backend_data:/app/data
      - backend_db:/app/db
      - static_files:/app/staticfiles
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: ["python", "manage.py", "migrate", "--noinput"]
    restart: "no"

  # --- Backend + ASGI (Daphne) ---
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    expose:
      - "8000"
    env_file:
      - ../.env
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=agent_platform
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-agent_platform_secret}
      - DB_HOST=db
      - DB_PORT=5432
      - CHANNEL_LAYER_BACKEND=channels_redis.core.RedisChannelLayer
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - backend_data:/app/data
      - backend_db:/app/db
      - static_files:/app/staticfiles
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agent_platform_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Redis (for Django Channels) ---
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Nginx reverse proxy ---
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_files:
  backend_data:
  backend_db:
